name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sovereign-wallet
        uses: actions/checkout@v4
        with:
          path: sovereign-wallet

      # Typecheck/lint need only @sovereignfs/sdk + @sovereignfs/ui types (both
      # published) plus @sovereignfs/tsconfig, which is workspace-only and not
      # published to npm. So this job composes the plugin into a fresh clone of
      # the platform monorepo and runs the checks there, scoped to this package
      # — the same "dev/test loop is always runtime-hosted" model plugin
      # authors use locally (see claude-sv/docs/plugin-development.md).
      - name: Checkout claude-sv platform
        uses: actions/checkout@v4
        with:
          repository: sovereignfs/claude-sv
          path: claude-sv
          token: ${{ secrets.PLATFORM_REPO_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Compose plugin into platform workspace
        run: |
          rm -rf claude-sv/plugins/sovereign-wallet
          cp -R sovereign-wallet claude-sv/plugins/sovereign-wallet

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: claude-sv/pnpm-lock.yaml

      - name: Install workspace dependencies
        working-directory: claude-sv
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: claude-sv
        run: pnpm --filter @sovereignfs/sovereign-wallet typecheck

      - name: Lint
        working-directory: claude-sv
        run: pnpm exec eslint plugins/sovereign-wallet --max-warnings 0

      - name: Format check
        working-directory: claude-sv
        run: pnpm exec prettier --check "plugins/sovereign-wallet/**/*.{ts,tsx,json,md,css}"
